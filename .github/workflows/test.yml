name: Test

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  test-with-login-env:
    name: Login via buddy/login env vars
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: buddy/login@v1
        with:
          token: ${{ secrets.BUDDY_TOKEN }}
          region: 'US'
      - uses: buddy/setup@v1
        with:
          installation_method: 'npm'
          env: 'dev'
      - name: Docker login via env vars
        uses: ./
      - name: Verify Docker login
        run: |
          if grep -q "container.registry.sh" "$HOME/.docker/config.json" 2>/dev/null; then
            echo "Buddy Docker registry login verified"
          else
            echo "Buddy Docker registry not found in Docker config"
            exit 1
          fi

  test-with-direct-inputs:
    name: Login via direct inputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: buddy/setup@v1
        with:
          installation_method: 'npm'
          env: 'dev'
      - name: Docker login with direct inputs
        uses: ./
        with:
          token: ${{ secrets.BUDDY_TOKEN }}
          region: us

  test-docker-pull:
    name: Docker pull before/after login
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Pull before login (should fail)
        id: pull-before
        continue-on-error: true
        run: docker pull "${{ secrets.BUDDY_DOCKER_IMAGE }}"
      - name: Verify pull failed
        run: |
          if [ "${{ steps.pull-before.outcome }}" == "failure" ]; then
            echo "Pull correctly failed before login"
          else
            echo "Pull should have failed before login"
            exit 1
          fi
      - uses: buddy/login@v1
        with:
          token: ${{ secrets.BUDDY_TOKEN }}
          region: 'US'
      - uses: buddy/setup@v1
        with:
          installation_method: 'npm'
          env: 'dev'
      - name: Docker login
        uses: ./
      - name: Pull after login
        run: docker pull "${{ secrets.BUDDY_DOCKER_IMAGE }}"

  test-failure:
    name: Invalid token (should fail)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: buddy/setup@v1
        with:
          installation_method: 'npm'
          env: 'dev'
      - name: Docker login with invalid token
        id: login-invalid
        continue-on-error: true
        uses: ./
        with:
          token: invalid-token
          region: us
      - name: Verify invalid token failed
        run: |
          if [ "${{ steps.login-invalid.outcome }}" == "failure" ]; then
            echo "Action correctly failed for invalid token"
          else
            echo "Action should have failed but succeeded"
            exit 1
          fi
